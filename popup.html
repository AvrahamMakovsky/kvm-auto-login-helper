<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KVM Auto Login Helper</title>
  <style>
    body {
      width: 330px;
      padding: 16px;
      font-family: Arial, sans-serif;
      color: #222;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 13px;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
      font-family: Consolas, monospace;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .checkbox-group input {
      margin-right: 8px;
    }

    .checkbox-group label {
      margin: 0;
      font-weight: normal;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    #save {
      background-color: #2e7d32;
      color: white;
    }

    #manual-login {
      background-color: #1565c0;
      color: white;
    }

    .hint {
      margin-top: 4px;
      font-size: 12px;
      color: #555;
      line-height: 1.35;
    }

    .warning {
      margin: 10px 0;
      padding: 8px;
      border: 1px solid #f0c36d;
      border-radius: 4px;
      background: #fff8e1;
      font-size: 12px;
      line-height: 1.35;
    }

    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      text-align: center;
      font-size: 13px;
    }

    .success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <h3>KVM Auto Login Helper</h3>

  <div class="checkbox-group">
    <input type="checkbox" id="enabled">
    <label for="enabled">Enable auto-login</label>
  </div>

  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" autocomplete="username" placeholder="Enter username">
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" placeholder="Enter password">
  </div>

  <div class="form-group">
    <label for="allowed-host-patterns">Allowed host patterns</label>
    <textarea id="allowed-host-patterns" spellcheck="false">192.168.*
10.*</textarea>
    <div class="hint">One pattern per line. Examples: 192.168.*, 10.*, 10.20.30.40</div>
  </div>

  <div class="warning">
    This tool stores credentials in Chrome extension local storage. Use only on trusted machines and approved local lab systems.
  </div>

  <button id="save">Save Settings</button>
  <button id="manual-login">Try Login on Current Tab</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
